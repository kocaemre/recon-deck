name: Release

on:
  push:
    tags:
      - "v*"

# packages: write is REQUIRED for GHCR publish (RESEARCH.md Pitfall 3 — without it,
# docker/login-action succeeds but docker/build-push-action fails on push with HTTP 403).
# contents: read is standard for checkout. id-token: write is harmless and enables future
# cosign signing (deferred to v1.1 per RESEARCH.md Open Question #2).
permissions:
  # `contents: write` is required by softprops/action-gh-release to
  # create the GitHub Release row at the end of the workflow.
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Build & Publish Multi-Arch Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # `latest=auto` only attaches :latest to a STABLE semver tag — a
          # pre-release tag (v1.2.3-beta.1) never moves :latest. This is what
          # keeps the beta channel from clobbering what stable users pull.
          flavor: |
            latest=auto
          # Semver-driven tags from the git tag.
          #   Stable  v1.2.3        → :1.2.3  :1.2  :1  :latest
          #   Beta    v1.2.3-beta.1 → :1.2.3-beta.1  :beta   (NO :latest, NO :1.2/:1)
          # The moving short tags (:1.2, :1) and :latest are reserved for stable
          # so a beta can never shadow a stable image at a coarse tag.
          # For v0.x.x: major-version tag is disabled to avoid an unstable "0".
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref, '-') }}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') && !contains(github.ref, '-') }}
            type=raw,value=beta,enable=${{ contains(github.ref, '-') }}

      # ─── Build WITHOUT push first, load locally, smoke test ───
      - name: Build (amd64) for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true                            # load into local Docker daemon
          tags: recon-deck:smoke-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test amd64
        run: ./scripts/ci/smoke-test.sh recon-deck:smoke-amd64

      - name: Build (arm64) for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: recon-deck:smoke-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test arm64
        run: ./scripts/ci/smoke-test.sh recon-deck:smoke-arm64

      # ─── All smoke tests passed — build+push multi-arch manifest ───
      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── Create the GitHub Release entry so api.github.com/.../releases/latest
      # surfaces this tag. The in-app update toast queries that endpoint —
      # without a Release row, every fresh install thinks it's already current.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          # Tags with a pre-release suffix (v2.5.0-beta.1) are published as
          # GitHub pre-releases. GitHub's /releases/latest endpoint excludes
          # pre-releases, so the in-app update toast never nudges stable users
          # toward a beta — only opted-in beta clients see them.
          prerelease: ${{ contains(github.ref_name, '-') }}
