name: Release

on:
  push:
    tags:
      - "v*"

# packages: write is REQUIRED for GHCR publish (RESEARCH.md Pitfall 3 — without it,
# docker/login-action succeeds but docker/build-push-action fails on push with HTTP 403).
# contents: read is standard for checkout. id-token: write is harmless and enables future
# cosign signing (deferred to v1.1 per RESEARCH.md Open Question #2).
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    name: Build & Publish Multi-Arch Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # Semver-driven tags from the git tag. Given v1.2.3:
          #   → ghcr.io/0xemrek/recon-deck:1.2.3
          #   → ghcr.io/0xemrek/recon-deck:1.2
          #   → ghcr.io/0xemrek/recon-deck:1
          #   → ghcr.io/0xemrek/recon-deck:latest
          # For v0.x.x: major-version tag is disabled to avoid an unstable "0".
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest

      # ─── Build WITHOUT push first, load locally, smoke test ───
      - name: Build (amd64) for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true                            # load into local Docker daemon
          tags: recon-deck:smoke-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test amd64
        run: ./scripts/ci/smoke-test.sh recon-deck:smoke-amd64

      - name: Build (arm64) for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: recon-deck:smoke-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test arm64
        run: ./scripts/ci/smoke-test.sh recon-deck:smoke-arm64

      # ─── All smoke tests passed — build+push multi-arch manifest ───
      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
