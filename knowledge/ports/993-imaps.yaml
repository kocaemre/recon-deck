schema_version: 1
port: 993
service: imaps
protocol: tcp
risk: medium
aliases:
  - ssl/imap
quick_facts:
  - "IMAP over implicit TLS"
  - "Same vectors as 143 once TLS is established"
checks:
  - key: imaps-banner
    label: "Captured IMAPS banner via openssl s_client"
  - key: imaps-creds
    label: "Tested credentials"
commands:
  - label: "openssl s_client"
    template: "openssl s_client -connect {IP}:{PORT}"
  - label: "nmap IMAPS scripts"
    template: "nmap -p{PORT} --script=imap-capabilities,ssl-cert,ssl-enum-ciphers {IP}"
resources:
  - title: "143,993 - Pentesting IMAP"
    url: "https://hacktricks.wiki/en/network-services-pentesting/pentesting-imap.html"
    author: HackTricks
