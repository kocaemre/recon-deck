schema_version: 1
port: 80
service: http
protocol: tcp
risk: medium
aliases:
  - www
  - http-alt
quick_facts:
  - "Always fingerprint the web server, framework, and CMS first"
  - "Check robots.txt, sitemap.xml, and common admin paths"
  - "Run a directory brute force in parallel with manual exploration"
checks:
  - key: http-banner-fingerprint
    label: "Identified server / framework / language stack"
  - key: http-robots-sitemap
    label: "Reviewed robots.txt and sitemap.xml"
  - key: http-vhost-enum
    label: "Tested for virtual hosts / Host header routing"
  - key: http-dir-bruteforce
    label: "Ran directory and file brute force"
  - key: http-default-creds
    label: "Tried default credentials on any login pages"
  - key: http-cve-scan
    label: "Checked banner / version against known CVEs"
commands:
  - label: "Quick fingerprint"
    template: "whatweb http://{IP}:{PORT}"
  - label: "Headers + banner"
    template: "curl -sI http://{IP}:{PORT}/"
  - label: "nikto baseline scan"
    template: "nikto -h http://{IP}:{PORT}"
  - label: "gobuster directory brute force"
    id: gobuster-dir
    template: "gobuster dir -u http://{IP}:{PORT} -w /usr/share/seclists/Discovery/Web-Content/raft-medium-directories.txt"
  - label: "ffuf with extensions"
    id: ffuf-ext
    template: "ffuf -u http://{IP}:{PORT}/FUZZ -w /usr/share/seclists/Discovery/Web-Content/raft-medium-directories.txt -e .php,.txt,.html"
  - label: "WordPress scan (wpscan)"
    id: wpscan
    template: "wpscan --url http://{IP}:{PORT}"
  - label: "vhost discovery"
    template: "ffuf -u http://{IP}:{PORT}/ -H 'Host: FUZZ.{HOST}' -w /usr/share/seclists/Discovery/DNS/subdomains-top1million-5000.txt -fs 0"
known_vulns:
  - match: "Apache 2.4.49"
    note: "Path traversal + RCE (CVE-2021-41773)"
    link: "https://hacktricks.wiki/en/network-services-pentesting/pentesting-web/index.html"
  - match: "Apache 2.4.50"
    note: "Path traversal patch bypass (CVE-2021-42013)"
    link: "https://hacktricks.wiki/en/network-services-pentesting/pentesting-web/index.html"
resources:
  - title: "80,443 - Pentesting Web Methodology"
    url: "https://hacktricks.wiki/en/network-services-pentesting/pentesting-web/index.html"
    author: HackTricks
  - title: "SecLists Web-Content"
    url: "https://github.com/danielmiessler/SecLists/tree/master/Discovery/Web-Content"
    author: SecLists
conditional:
  - id: php-detected
    when:
      anyOf:
        - nmap_script_contains:
            script: http-server-header
            pattern: "PHP"
        - nmap_script_contains:
            script: http-php-version
            pattern: "PHP"
        - autorecon_finding:
            type: tech
            value: php
    adds_checks:
      - key: http-php-info-pages
        label: "Tested phpinfo.php / info.php / test.php"
      - key: http-php-cve-check
        label: "Checked common PHP CVEs against detected version"
      - key: http-php-lfi
        label: "Tested LFI on common PHP entry points"
    modifies_commands:
      gobuster-dir:
        append: " -x php,html,txt"
  - id: wordpress-detected
    when:
      anyOf:
        - nmap_script_contains:
            script: http-generator
            pattern: "WordPress"
        - nmap_script_contains:
            script: http-title
            pattern: "WordPress"
        - autorecon_finding:
            type: tech
            value: wordpress
    adds_checks:
      - key: http-wordpress-wpscan
        label: "Ran wpscan (users/plugins/themes)"
      - key: http-wordpress-login
        label: "Checked wp-login.php / wp-admin for weak creds"
    modifies_commands:
      wpscan:
        append: " --enumerate u,ap,at"
  - id: aspnet-detected
    when:
      anyOf:
        - nmap_script_contains:
            script: http-server-header
            pattern: "Microsoft-IIS"
        - nmap_script_contains:
            script: http-server-header
            pattern: "ASP.NET"
        - nmap_script_contains:
            script: http-headers
            pattern: "ASP.NET"
        - autorecon_finding:
            type: tech
            value: asp.net
    adds_checks:
      - key: http-aspnet-trace-axd
        label: "Checked /trace.axd and common ASP.NET debug endpoints"
      - key: http-aspnet-viewstate
        label: "Reviewed ViewState / event validation settings"
    modifies_commands:
      ffuf-ext:
        append: ",.aspx,.asp,.ashx"
